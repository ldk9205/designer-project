# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Spring Application
# ===============================
spring.application.name=backend

# ===============================
# MySQL Database Connection
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/designer?allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

# ===============================
# MyBatis Settings
# ===============================

# mapper.xml 铆聦聦矛聺录 矛聹聞矛鹿聵 (resources/mapper 铆聫麓毛聧聰 矛聲聞毛聻聵)
mybatis.mapper-locations=classpath:mapper/*.xml

# DTO/VO 铆聛麓毛聻聵矛聤陇 铆聦篓铆聜陇矛搂聙 矛搂聙矛聽聲 (alias 矛聻聬毛聫聶 毛聯卤毛隆聺)
mybatis.type-aliases-package=com.designer.auth.dto

# DB矛聺聵 snake_case 矛禄卢毛聼录矛聺聞 Java矛聺聵 camelCase毛隆聹 矛聻聬毛聫聶 毛搂陇铆聲聭
mybatis.configuration.map-underscore-to-camel-case=true

# ===============================
# AWS S3 Settings
# ===============================

# S3 毛虏聞铆聜路 矛聺麓毛娄聞
aws.s3.bucket-name=treatment-image

# S3 毛娄卢矛聽聞
aws.s3.region=ap-northeast-2

# 矛聴聟毛隆聹毛聯聹矛職漏 Presigned URL 毛搂聦毛拢聦 矛聥聹锚掳聞 (矛麓聢)
aws.s3.presign.upload-expiration-seconds=300

# 毛聥陇矛職麓毛隆聹毛聯聹矛職漏 Presigned URL 毛搂聦毛拢聦 矛聥聹锚掳聞 (矛麓聢)
aws.s3.presign.download-expiration-seconds=300

# ===============================
# Logging
# ===============================

# Mapper 铆聦篓铆聜陇矛搂聙 SQL 毛隆聹锚路赂 矛露聹毛聽楼
logging.level.com.designer.auth.mapper=DEBUG
